<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Apple Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Text&display=swap');

  html, body {
    height: 100%;
    margin: 0;
    background-color: #f5f5f7;
    font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
      Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  }

  body {
    display: flex;
    justify-content: center; /* centru orizontal */
    align-items: center;     /* centru vertical */
  }

  form {
    background: white;
    width: 340px;
    padding: 2.5rem 2rem;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    box-sizing: border-box;
  }

  h2 {
    margin-bottom: 1.5rem;
    font-weight: 600;
    color: #1d1d1f;
    text-align: center;
  }

  label {
    display: block;
    margin-bottom: 0.3rem;
    font-weight: 500;
    color: #3c3c4399;
  }

  input[type="email"],
  input[type="password"],
  select {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 1.3rem;
    border: 1px solid #d2d2d7;
    border-radius: 10px;
    font-size: 16px;
    color: #1d1d1f;
    outline-offset: 2px;
    transition: border-color 0.3s ease;
  }

  input[type="email"]:focus,
  input[type="password"]:focus,
  select:focus {
    border-color: #0071e3;
    box-shadow: 0 0 6px #0071e3;
  }

  button {
    width: 100%;
    padding: 14px 0;
    background: #0071e3;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background: #005bb5;
  }
</style>
</head>
<body>

<form (submit)="login(); $event.preventDefault()">
  <h2>Autentificare</h2>
  <label for="email">Email</label>
  <input id="email" type="email" name="email" required [(ngModel)]="email" />

  <label for="parola">Parolă</label>
  <input id="parola" type="password" name="parola" required [(ngModel)]="parola" />

  <label for="rol">Rol</label>
  <select id="rol" name="rol" [(ngModel)]="rol">
    <option value="student">Student</option>
    <option value="profesor">Profesor</option>
  </select>

  <button type="submit">Login</button>
</form>

</body>
</html>
